<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    
    <!-- Tailwind CSS 로드: 세련되고 현대적인 UI 스타일링을 위해 사용합니다 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 구글 Inter 폰트 및 고딕 폰트 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 아이콘 팩 로드 (돋보기, 위치핀 등의 아이콘을 그리기 위해 필요합니다) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 기본 글꼴을 구글 고딕 폰트와 깔끔한 Inter 폰트로 통합 적용합니다 */
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
        /* 지도 위에 띄울 상세 정보 창(말풍선)을 더 예쁘게 꾸미기 위한 스타일 */
        .custom-infowindow {
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
            border-radius: 12px;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #f3f4f6;
        }
    </style>

    <!-- 카카오 맵 라이브러리를 동적으로 안전하게 로드하기 위해 autoload=false 파라미터를 사용합니다 -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a600ea145349b868d24791c87be1fc4f&libraries=services&autoload=false"></script>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col">

    <!-- 상단 헤더 영역 -->
    <header class="bg-indigo-600 text-white px-6 py-4 shadow-md flex items-center justify-between z-20 shrink-0">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-map-location-dot text-2xl animate-bounce"></i>
            <h1 class="text-xl font-bold tracking-wide">MapFinder <span class="text-xs font-normal bg-indigo-500 py-1 px-2 rounded-full ml-1">v1.0</span></h1>
        </div>
        <p class="text-sm opacity-90 hidden sm:block">HTML/CSS/JS 공부를 응원합니다! 🚀</p>
    </header>

    <!-- 메인 콘텐츠 영역: 화면을 좌(검색/결과), 우(지도)로 나누는 그리드/플렉스 레이아웃 -->
    <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- 좌측 사이드바: 검색창 입력 폼 및 결과 리스트 출력 영역 -->
        <aside class="w-full md:w-[400px] bg-white shadow-xl z-10 flex flex-col border-r border-gray-100 shrink-0">
            <!-- 검색 폼 및 현재위치 이동 영역 -->
            <div class="p-5 border-b border-gray-100 bg-gray-50">
                <form id="searchForm" onsubmit="handleSearchSubmit(event)" class="space-y-3">
                    <label for="keywordInput" class="block text-sm font-semibold text-gray-700">원하는 장소를 검색해보세요</label>
                    <div class="relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                        </div>
                        <input type="text" id="keywordInput" 
                               class="focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block w-full pl-10 pr-20 sm:text-sm border-gray-300 rounded-lg p-3 border outline-none transition-all" 
                               placeholder="예: 강남역 맛집, 스타벅스, 도서관">
                        <button type="submit" 
                                class="absolute inset-y-1.5 right-1.5 px-4 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-medium rounded-md transition-colors duration-200">
                            검색
                        </button>
                    </div>
                </form>
                
                <!-- 현재 위치 기준 재탐색 버튼 -->
                <button onclick="moveToCurrentLocation()" class="mt-3 w-full flex items-center justify-center gap-2 bg-white hover:bg-gray-100 text-gray-700 border border-gray-300 rounded-lg py-2.5 text-sm font-medium transition-all shadow-sm">
                    <i class="fa-solid fa-location-crosshairs text-indigo-500"></i>
                    내 현재 위치로 지도 이동
                </button>
            </div>

            <!-- 검색 결과 리스트 영역 (내용이 길어지면 스크롤바가 자동 생성됩니다) -->
            <div class="flex-1 overflow-y-auto" id="resultsContainer">
                <!-- 초기 상태 표시 안내 메시지 -->
                <div id="initialState" class="p-8 text-center text-gray-500">
                    <i class="fa-solid fa-circle-info text-3xl text-gray-300 mb-3 block"></i>
                    <p class="font-medium">궁금한 장소를 검색해 보세요!</p>
                    <p class="text-xs text-gray-400 mt-1">검색 결과가 여기에 리스트 형태로 나타납니다.</p>
                </div>

                <!-- 실제 검색 결과가 렌더링될 리스트 구조 -->
                <ul id="placesList" class="divide-y divide-gray-100 hidden"></ul>
            </div>
            
            <!-- 검색 결과 도움말 가이드 바 -->
            <div id="resultsFooter" class="bg-gray-50 border-t border-gray-100 p-3 text-xs text-gray-500 text-center hidden">
                리스트를 클릭하면 해당 위치로 부드럽게 지도가 이동합니다.
            </div>
        </aside>

        <!-- 우측 지도 영역 -->
        <main class="flex-1 relative">
            <!-- 지도가 그려질 컨테이너 엘리먼트 -->
            <div id="kakaoMap" class="w-full h-full"></div>
            
            <!-- 지도 로딩 오버레이 레이어 (지도가 성공적으로 활성화되기 전까지 화면을 가려주는 역할을 함) -->
            <div id="mapLoader" class="absolute inset-0 bg-gray-100 flex flex-col items-center justify-center z-30 transition-opacity duration-500">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-600 mb-4"></div>
                <p class="text-gray-600 font-medium">카카오 지도를 안전하게 불러오는 중입니다...</p>
                <p class="text-xs text-gray-400 mt-1">브라우저의 위치 권한 요청 팝업이 뜨면 '허용'을 눌러주세요.</p>
            </div>

            <!-- 현재 위치 GPS 탐색 상태 표시 뱃지 -->
            <div class="absolute top-4 right-4 bg-white/95 backdrop-blur shadow-md rounded-full px-4 py-2 z-10 text-xs font-semibold text-gray-700 border border-gray-200 flex items-center gap-2">
                <span id="locationBadgeStatus" class="h-2 w-2 rounded-full bg-red-500 animate-ping"></span>
                <span id="locationBadgeText">위치 권한 탐색 대기 중...</span>
            </div>
        </main>
    </div>

    <!-- 커스텀 알림 토스트 (원치않는 alert() 창 대신 하단에서 나타나는 애니메이션 메시지바입니다) -->
    <div id="toastNotification" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 bg-gray-900 text-white px-5 py-3 rounded-lg shadow-2xl z-50 flex items-center space-x-2 transition-all duration-300">
        <i class="fa-solid fa-circle-exclamation text-yellow-400"></i>
        <span id="toastMessage" class="text-sm font-medium">알림 메시지</span>
    </div>

    <!-- 자바스크립트 영역 시작 -->
    <script>
        // 전역 변수 설정 (어디서나 부르고 수정하기 쉽게 선언합니다)
        let mapInstance = null;             // 생성된 카카오 지도 객체를 저장
        let placesService = null;           // 장소 검색 라이브러리 서비스 객체
        let activeInfoWindow = null;        // 현재 화면에 한 개만 표시될 상세 인포윈도우 객체
        let resultMarkersArray = [];        // 지도상에 뿌려진 검색 마커들을 모은 배열
        let currentLocationMarker = null;   // 사용자 현재 GPS 위치를 알려주는 단 하나의 특별 마커
        let currentUserCoordinates = null;  // 위도/경도가 포맷팅되어 담기는 좌표 데이터

        // 웹 브라우저의 화면 뼈대가 모두 안전하게 준비되면 지도 로드를 개시합니다.
        window.addEventListener('DOMContentLoaded', () => {
            initializeKakaoMapSDK();
        });

        // 1. 카카오맵 SDK 로딩 검증 및 실행 함수
        function initializeKakaoMapSDK() {
            // 외부 SDK 스크립트가 잘 올라갔는지 검증합니다.
            if (typeof kakao !== 'undefined' && kakao.maps) {
                // autoload=false 속성을 주었으므로 반드시 직접 .load()를 명시해야 합니다. (로딩 버그 제로화)
                kakao.maps.load(() => {
                    setupMapAndServices();
                });
            } else {
                showToast("카카오맵 SDK를 연결할 수 없습니다. HTML 헤더 부분의 API 키를 점검해 보세요!");
            }
        }

        // 2. 카카오 지도 화면 그리기 및 셋업 진행
        function setupMapAndServices() {
            const mapContainer = document.getElementById('kakaoMap');
            
            // 초기 지도의 기본값 설정 (서울 시청 위경도 기준, 줌 레벨 5 조건 지정)
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567),
                level: 5 // 확대 레벨 5로 완벽 적용
            };

            // 설정값대로 지도 생성 후 전역 인스턴스에 할당
            mapInstance = new kakao.maps.Map(mapContainer, mapOptions);
            
            // 키워드 장소 검색을 수행할 서비스 인스턴스를 메모리에 등록
            placesService = new kakao.maps.services.Places();
            
            // 지도 확대/축소용 표준 줌 컨트롤러 추가
            const zoomControl = new kakao.maps.ZoomControl();
            mapInstance.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

            // 지도 로딩이 완료되었으므로 안내 오버레이 레이어를 매끄럽게 가려줍니다.
            const loaderOverlay = document.getElementById('mapLoader');
            loaderOverlay.classList.add('opacity-0');
            setTimeout(() => {
                loaderOverlay.classList.add('hidden');
            }, 500);

            // 사용자의 GPS 위경도 정보 수집을 시도합니다.
            requestUserGeolocation();
        }

        // 3. 사용자의 실제 위경도 위치 가져오기 (Geolocation API 사용)
        function requestUserGeolocation() {
            const badgeStatus = document.getElementById('locationBadgeStatus');
            const badgeText = document.getElementById('locationBadgeText');

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const latitude = position.coords.latitude;
                        const longitude = position.coords.longitude;
                        
                        // 가져온 좌표를 카카오 전용 LatLng 좌표로 변환해 저장
                        currentUserCoordinates = new kakao.maps.LatLng(latitude, longitude);
                        
                        // 지도의 부드러운 카메라 무빙을 활용해 현재위치로 중앙 설정
                        mapInstance.setCenter(currentUserCoordinates);
                        
                        // 현재위치 전용 특별 아이콘 마커 생성
                        drawCurrentLocationMarker(currentUserCoordinates);

                        // 우측 상단 뱃지의 색상과 글자를 '추적 완료' 상태로 갱신
                        badgeStatus.classList.remove('bg-red-500');
                        badgeStatus.classList.add('bg-emerald-500');
                        badgeText.textContent = "내 위치 수집 완료";
                    },
                    (error) => {
                        // 위치 권한 차단 등의 사유로 취소되었을 때 복구 처리
                        handleGeolocationError(error);
                    }
                );
            } else {
                showToast("브라우저에서 지오로케이션(위치 센서)을 사용할 수 없습니다.");
                setDefaultFallbackLocation();
            }
        }

        // 사용자의 실제 위치를 상징하는 파란 점 형태의 고정 마커 생성
        function drawCurrentLocationMarker(position) {
            // 만약 기존에 찍어놓은 현재위치 핀이 있다면 리셋합니다.
            if (currentLocationMarker) {
                currentLocationMarker.setMap(null);
            }

            // 구글 지도 스타일의 현재 위치 원형 핀 이미지 지정
            const markerImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2018/pc/img/marker_spot.png';
            const markerImageSize = new kakao.maps.Size(24, 35);
            const markerImage = new kakao.maps.MarkerImage(markerImageUrl, markerImageSize);

            currentLocationMarker = new kakao.maps.Marker({
                position: position,
                image: markerImage,
                map: mapInstance,
                title: '나의 현재 위치'
            });

            // 마커 바로 위에 풍선 도움말 하나를 자동으로 열어줍니다.
            const initialTooltip = new kakao.maps.InfoWindow({
                content: '<div class="px-2.5 py-1 text-[11px] font-bold text-indigo-600">내 현재 위치 📍</div>'
            });
            initialTooltip.open(mapInstance, currentLocationMarker);
            
            // 3.5초가 지나면 화면이 깨끗해지도록 도움말을 닫아줍니다.
            setTimeout(() => {
                initialTooltip.close();
            }, 3500);
        }

        // GPS 실패 시 오류 분석 대응
        function handleGeolocationError(error) {
            let message = "위치 확인에 실패했습니다.";
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    message = "위치 권한 요청이 거부되었습니다. 서울시청을 임시 중심으로 적용합니다.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = "현재 장소 주변의 GPS 신호를 잡을 수 없어 기본 위치(서울)를 제공합니다.";
                    break;
                case error.TIMEOUT:
                    message = "사용자의 기기 연결 시간 초과로 기본 위치를 적용합니다.";
                    break;
            }
            showToast(message);
            setDefaultFallbackLocation();
        }

        // 기본 백업 위치 세팅 (서울 광장 기준)
        function setDefaultFallbackLocation() {
            const defaultLocation = new kakao.maps.LatLng(37.566826, 126.9786567);
            mapInstance.setCenter(defaultLocation);
            
            const badgeStatus = document.getElementById('locationBadgeStatus');
            const badgeText = document.getElementById('locationBadgeText');
            badgeStatus.classList.remove('bg-red-500', 'animate-ping');
            badgeStatus.classList.add('bg-gray-400');
            badgeText.textContent = "기본 위치 사용 중 (서울)";
        }

        // "내 현재 위치로 지도 이동" 버튼 인터랙션
        function moveToCurrentLocation() {
            if (currentUserCoordinates) {
                mapInstance.setCenter(currentUserCoordinates);
                mapInstance.setLevel(5); // 약속된 5레벨 줌 유지
                showToast("현재 있는 위치로 지도를 이동했습니다.");
            } else {
                showToast("위치 센서를 다시 재탐색합니다.");
                requestUserGeolocation();
            }
        }

        // 4. 입력받은 키워드 장소 검색 수행 함수
        function handleSearchSubmit(event) {
            // form 제출 행동 시 화면이 새로고침되는 현상을 확실하게 차단합니다.
            event.preventDefault(); 
            
            const searchKeyword = document.getElementById('keywordInput').value.trim();
            if (!searchKeyword) {
                showToast("원하시는 검색어를 입력란에 채워주세요!");
                return;
            }

            // 지도 중심 좌표 기준으로 10km 반경을 우선으로 두어 효율적인 지역 맞춤 검색 제공
            const mapCenter = mapInstance.getCenter();
            const searchOptions = {
                location: mapCenter,
                radius: 10000        // 반경 10,000m (10km) 범위 내
            };

            // 카카오 키워드 검색 서비스 가동!
            placesService.keywordSearch(searchKeyword, (data, status) => {
                processSearchResults(data, status);
            }, searchOptions);
        }

        // 5. 서버로부터 받은 검색 결과 분석 및 리스트 갱신
        function processSearchResults(placesData, status) {
            const resultsContainer = document.getElementById('resultsContainer');
            const placesListElement = document.getElementById('placesList');
            const initialStateElement = document.getElementById('initialState');
            const resultsFooterElement = document.getElementById('resultsFooter');

            // 1) 지도를 깔끔히 하기 위해 전 검색 흔적용 마커 전체 지우기
            clearPreviousMarkers();
            
            // 2) 팝업되어 떠 있던 정보 풍선도 닫기
            if (activeInfoWindow) {
                activeInfoWindow.close();
            }

            // 응답 신호가 성공인지 검사
            if (status === kakao.maps.services.Status.OK) {
                // 기존 대기 상태 메시지를 가리고 보드를 오픈
                initialStateElement.classList.add('hidden');
                placesListElement.classList.remove('hidden');
                resultsFooterElement.classList.remove('hidden');
                
                // 검색할 때마다 목록이 누적되지 않도록 완전히 비움
                placesListElement.innerHTML = '';

                // 지도상에 찍힌 다수 마커들이 한 번에 눈에 들어오도록 범위를 자동 설정해주는 경계선(Bounds) 생성
                const bounds = new kakao.maps.LatLngBounds();

                // 찾아진 장소 배열을 순환하면서 데이터 리스팅 처리
                placesData.forEach((place, index) => {
                    const placePosition = new kakao.maps.LatLng(place.y, place.x);
                    
                    // 범위 구역에 좌표 확장 포함
                    bounds.extend(placePosition);

                    // 지도 영역에 마커 배치
                    const createdMarker = createPlaceMarker(placePosition, index, place);
                    resultMarkersArray.push(createdMarker);

                    // 좌측 UI 목록에 삽입할 리스트 노드 생성
                    const listElement = buildPlaceListItem(place, index, placePosition, createdMarker);
                    placesListElement.appendChild(listElement);
                });

                // 마커들이 가득 찬 영역 전체를 다 보일 수 있도록 줌 크기 자동 축소/확대 처리
                mapInstance.setBounds(bounds);
                
                // 너무 심하게 밀착되어 확대되는 경우가 있기에 0.2초 여유를 두어 5 레벨로 한계선 조율
                setTimeout(() => {
                    if(mapInstance.getLevel() < 5) {
                        mapInstance.setLevel(5);
                    }
                }, 200);

            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                // 검색 결과가 아예 없는 상황 예외 처리
                placesListElement.classList.add('hidden');
                resultsFooterElement.classList.add('hidden');
                initialStateElement.classList.remove('hidden');
                initialStateElement.innerHTML = `
                    <div class="p-8 text-center text-gray-500">
                        <i class="fa-solid fa-triangle-exclamation text-3xl text-amber-500 mb-3 block"></i>
                        <p class="font-semibold text-gray-700">검색 결과가 발견되지 않았습니다.</p>
                        <p class="text-xs text-gray-400 mt-1">철자나 지역 이름이 맞는지 확인해 보세요.</p>
                    </div>
                `;
                showToast("검색 조건에 맞는 장소가 한 곳도 없습니다.");
            } else if (status === kakao.maps.services.Status.ERROR) {
                showToast("서버 네트워크 오류가 확인됩니다. 잠시 후 시도해 보세요.");
            }
        }

        // 6. 개별 장소용 좌표 마커 생성 및 클릭 트리거 연결
        function createPlaceMarker(position, index, placeDetail) {
            const marker = new kakao.maps.Marker({
                position: position,
                map: mapInstance
            });

            // 마커를 클릭하면 상세 인포윈도우가 뜨도록 클릭 리스너 연결
            kakao.maps.event.addListener(marker, 'click', () => {
                displayMarkerInfoWindow(marker, placeDetail);
            });

            return marker;
        }

        // 개별 마커 클릭시 말풍선 팝업 출력
        function displayMarkerInfoWindow(targetMarker, placeInfo) {
            if (activeInfoWindow) {
                activeInfoWindow.close();
            }

            // HTML 문법을 활용한 가독성 높은 말풍선 정보 영역 렌더링
            const htmlContent = `
                <div class="custom-infowindow min-w-[200px]">
                    <div class="font-bold text-gray-900 text-sm truncate">${placeInfo.place_name}</div>
                    <div class="text-[11px] text-gray-500 mt-1 truncate">${placeInfo.road_address_name || placeInfo.address_name}</div>
                    ${placeInfo.phone ? `<div class="text-[11px] text-indigo-600 mt-1"><i class="fa-solid fa-phone mr-1"></i>${placeInfo.phone}</div>` : ''}
                    <div class="mt-2.5 text-right">
                        <a href="https://map.kakao.com/link/map/${placeInfo.id}" target="_blank" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-2 py-1 rounded text-[10px] font-semibold transition-colors">
                            큰 지도로 길찾기 <i class="fa-solid fa-arrow-up-right-from-square text-[8px] ml-0.5"></i>
                        </a>
                    </div>
                </div>
            `;

            const infoWindowInstance = new kakao.maps.InfoWindow({
                content: htmlContent,
                removable: true
            });

            infoWindowInstance.open(mapInstance, targetMarker);
            activeInfoWindow = infoWindowInstance;

            // 지도 카메라를 해당 마커 주소로 스무스하게 슥 밀어줍니다.
            mapInstance.panTo(targetMarker.getPosition());
        }

        // 7. 좌측 사이드바 결과 리스트 아이템 디자인 구성
        function buildPlaceListItem(place, index, position, associatedMarker) {
            const listItem = document.createElement('li');
            listItem.className = 'p-4 hover:bg-indigo-50/40 cursor-pointer transition-all duration-150 flex items-start gap-3 border-l-4 border-transparent hover:border-indigo-600';

            // 고유 정렬 번호 뱃지 가공
            const indexBadgeHtml = `
                <span class="flex-shrink-0 w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold mt-0.5">
                    ${index + 1}
                </span>
            `;

            // 본체 제목 및 부가 텍스트 가공
            const bodyHtml = `
                <div class="flex-1 min-w-0">
                    <h3 class="text-sm font-bold text-gray-900 truncate">${place.place_name}</h3>
                    <p class="text-xs text-gray-500 mt-1 truncate">${place.road_address_name || place.address_name}</p>
                    ${place.phone ? `
                        <p class="text-xs text-gray-400 mt-1 flex items-center gap-1">
                            <i class="fa-solid fa-phone text-[10px]"></i> ${place.phone}
                        </p>
                    ` : ''}
                    <div class="mt-2 flex items-center gap-2">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-medium bg-gray-100 text-gray-600">
                            ${place.category_group_name || '일반 분류'}
                        </span>
                    </div>
                </div>
            `;

            listItem.innerHTML = indexBadgeHtml + bodyHtml;

            // 리스트 안의 목록 카드를 마우스로 클릭할 때 실행할 이벤트 바인딩
            listItem.addEventListener('click', () => {
                mapInstance.setLevel(5); // 줌 레벨 5 조정
                mapInstance.panTo(position); // 카메라 위치 부드럽게 복구
                displayMarkerInfoWindow(associatedMarker, place); // 해당 연관 마커 인포윈도우 오토 클릭
            });

            return listItem;
        }

        // 8. 보조용 유틸리티 함수 (기존 흔적 제거 및 알림창 기능)
        function clearPreviousMarkers() {
            // 지도와 메모리에 존재하던 구글 맵마커를 완전 해제하여 메모리 낭비를 줄입니다.
            resultMarkersArray.forEach(marker => {
                marker.setMap(null);
            });
            resultMarkersArray = [];
        }

        // 화면 하단에서 나타나는 애니메이션 알림창 (Toast Notification) 구현
        function showToast(message) {
            const toastElement = document.getElementById('toastNotification');
            const toastMessageElement = document.getElementById('toastMessage');

            // 내용 대입 후 좌표 이동 및 투명도를 올려 화면에 보여줌
            toastMessageElement.textContent = message;
            toastElement.classList.remove('translate-y-20', 'opacity-0');
            toastElement.classList.add('translate-y-0', 'opacity-100');

            // 3.5초 후 다시 하단으로 숨어들게 설정
            setTimeout(() => {
                toastElement.classList.remove('translate-y-0', 'opacity-100');
                toastElement.classList.add('translate-y-20', 'opacity-0');
            }, 3500);
        }
    </script>
</body>
</html>
